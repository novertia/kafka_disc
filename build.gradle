plugins {
    id 'java'
    id 'application'
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.0'
    compileOnly 'org.projectlombok:lombok:1.18.30'
    annotationProcessor 'org.projectlombok:lombok:1.18.30'
}

application {
    mainClass = 'com.example.kafkadisc.Server'
}

task runBroker(type: JavaExec) {
    group = "Execution"
    description = "Run the Broker class"
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'com.example.kafkadisc.Server'
    standardInput = System.in
}


task runClient(type: JavaExec) {
    group = "Execution"
    description = "Run the Client class"
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'com.example.kafkadisc.Client'
    standardInput = System.in
}

task runConsumer(type: JavaExec) {
    group = "Execution"
    description = "Run the Consumer class"
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'com.example.kafkadisc.Consumer'
    standardInput = System.in
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}
